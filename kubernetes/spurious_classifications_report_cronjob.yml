apiVersion: batch/v1
kind: CronJob
metadata:
  name: eras-spurious-classifications-report-cronjob
spec:
  schedule: "0 14 * * 1"
  jobTemplate:
    spec:
      template:
        metadata:
          name: eras-spurious-classifications-report
        spec:
          containers:
          - name: eras-spurious-classifications-report
            image: ghcr.io/zooniverse/eras
            env:
            - name: RAILS_LOG_TO_STDOUT
              value: "true"
            - name: RAILS_ENV
              value: production
            - name: RAILS_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: eras-production
                  key: rails-master-key
            command:
            - /bin/sh
            - -c
            - cd scripts; ruby spurious_classifications_alerter.rb
          restartPolicy: Never
      backoffLimit: 2
